<script>

/* =========================
   HEUTE + WOCHENPLAN
========================= */
const week = {
  Mo: "17 Uhr Schwimmen",
  Di: "17 Uhr Englisch",
  Mi: "18 Uhr Reha",
  Do: "Sophie Sportzeug",
  Fr: "15 Uhr Reha & Tanzen",
  Sa: "",
  So: ""
};

const todayIndex = new Date().getDay(); 
// 0=So ... 6=Sa

const days = ["So","Mo","Di","Mi","Do","Fr","Sa"];

let html = "";

days.forEach((day, index) => {
  let content = week[day] || "-";
  if (index === todayIndex) {
    html += `<p><strong>${day}: ${content}</strong></p>`;
  } else {
    html += `<p>${day}: ${content}</p>`;
  }
});

document.getElementById("week").innerHTML = html;



document.getElementById("jacket").innerText = jacketIndex(currentTemp);

/* =========================
   HEUTE + WOCHENPLAN
========================= */

var today = new Date();
var weekdays = ["So","Mo","Di","Mi","Do","Fr","Sa"];

document.getElementById("date").innerHTML =
    weekdays[today.getDay()] + " " + formatDate(today);



function formatDate(d){
    var day=("0"+d.getDate()).slice(-2);
    var mon=("0"+(d.getMonth()+1)).slice(-2);
    var y=d.getFullYear();
    return day+"."+mon+"."+y;
}


/* =========================
   WETTER (3-Tage und 12-Stunden)
========================= */

function getIcon(code){
    if(code==0) return "☀";
    if(code<=3) return "⛅";
    if(code<=48) return "☁";
    if(code<=67) return "🌧";
    if(code<=77) return "❄";
    return "☁";
}

var lat = 51.3999693;
var lon = 7.1836594;
var currentTemp = 0;
var xhr = new XMLHttpRequest();
xhr.open(
    "GET",
    "https://api.open-meteo.com/v1/forecast?latitude="+lat+
    "&longitude="+lon+
    "&hourly=temperature_2m,precipitation,weathercode"+
    "&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max"+
    "&timezone=Europe%2FBerlin",
    true
);

xhr.onreadystatechange = function(){
    if(xhr.readyState !== 4) return;

    var data = JSON.parse(xhr.responseText);
    var weatherDiv = document.getElementById("weather");
    var hourlyDiv = document.getElementById("hourly");

    // 3-Tage Vorschau
    for(var i=0;i<3;i++){
        var d = new Date();
        d.setDate(today.getDate()+i);

        var icon = getIcon(data.daily.weathercode[i]);
        var min = Math.round(data.daily.temperature_2m_min[i]);
        var max = Math.round(data.daily.temperature_2m_max[i]);
        var rain = data.daily.precipitation_probability_max[i];
		currentTemp = min;
        var box = document.createElement("div");
        box.style.textAlign = "center";
        box.innerHTML =
            "<div style='font-size:64px'>"+icon+"</div>"+
            "<div style='font-weight:bold'>"+weekdays[d.getDay()]+": "+min+"°–"+max+"°</div>"+
            "<div>"+rain+"% Regen</div>";

        weatherDiv.appendChild(box);
    }

    // 12-Stunden Vorschau, aktuelle Stunde -1
    var hourNow = today.getHours();
    var startIndex = Math.max(0, hourNow-1);
    for(var i=startIndex; i<startIndex+10 && i<data.hourly.time.length; i++){
        var time = new Date(data.hourly.time[i]);
        var temp = Math.round(data.hourly.temperature_2m[i]);
        var prec = data.hourly.precipitation[i];
        var icon = getIcon(data.hourly.weathercode[i]);


        var hbox = document.createElement("div");
        hbox.style.textAlign = "center";
		

        hbox.innerHTML =
			"<div style='font-size:64px;'>"+icon+"</div>"+
			("0"+time.getHours()).slice(-2)+":00<br>"+
			temp+"°<br>"+
			prec+"mm";

        hourlyDiv.appendChild(hbox);
    }

};
xhr.send();

/* =========================
   EventCountdown
========================= */


function updateCountdown() {
  const today = new Date();
  const events = [
	{ name: "Osterferien", date: "2026-03-28" },
	{ name: "Sommerferien", date: "2026-07-18" },
	{ name: "Herbstferien", date: "2026-10-17" },
	{ name: "Weihnachtsferien", date: "2026-12-23" },
	{ name: "Weihnachten", date: "2026-12-25" },
	{ name: "Geburtstag Sophie", date: "2027-01-13" },
	{ name: "Geburtstag Melanie", date: "2027-03-02" },
	{ name: "Geburtstag Nico", date: "2026-09-19" },
];

const upcomingEvents = events
    .map(event => ({
      ...event,
      target: new Date(event.date),
      diff: Math.ceil((new Date(event.date) - today) / (1000 * 60 * 60 * 24))
    }))
    .filter(event => event.diff >= 0)
    // Sortiere nach diff aufsteigend (nächstes zuerst)
    .sort((a, b) => a.diff - b.diff);

  let html = "";
  upcomingEvents.forEach(event => {
    html += `<p>${event.name}: noch <strong>${event.diff}</strong> Tage</p>`;
  });

  document.getElementById("countdown").innerHTML = html;
}

updateCountdown();



/* =========================
   Jackenindex
========================= */


function jacketIndex(temp) {
  if (temp < 6) return "🧥 Dicke Jacke!";
  if (temp >= 6 && temp <= 13) return "🧥 Leichte Jacke!";
  if (temp >= 20) return "👕 T-Shirt-Wetter!";
  return "🧥Übergangswetter";
}

var list = document.getElementById("trashlist");

for(var i=0;i<5 && i<events.length;i++){
    var ev = events[i];
    var d = new Date(ev.date);

    var div = document.createElement("div");
    div.style.border="1px solid black";
    div.style.padding="6px 10px";
    div.style.textAlign="center";
	div.style.fontSize="32px";  // Passe an (z.B. 12px klein, 16px normal)
    
	var icons = getTrashIcon(ev.title);
    var name = ev.title.replace(/^Leerung:\s*/i,"");


    div.innerHTML =
        icons + "<br>" +
        name + "<br>" +
        formatShort(d);

    if(isSameDay(d,today)){
        div.style.background="black";
        div.style.color="white";
    }

    list.appendChild(div);
}


function parseICS(text){
    var lines=text.split(/\r?\n/);
    var events=[];
    var current=null;
    for(var i=0;i<lines.length;i++){
        var line=lines[i];
        if(line.indexOf("BEGIN:VEVENT")===0){ current={}; }
        if(line.indexOf("DTSTART")===0){
            var date=line.split(":")[1];
            current.date = date.substr(0,4)+"-"+date.substr(4,2)+"-"+date.substr(6,2);
        }
        if(line.indexOf("SUMMARY")===0){
            current.title=line.split(":").slice(1).join(":").trim();
        }
        if(line.indexOf("END:VEVENT")===0 && current){
            if(new Date(current.date)>=today){ events.push(current); }
            current=null;
        }
    }
    events.sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    return events;
}

function getTrashIcon(title){
    title=title.toLowerCase();
    var icons=[];
    if(title.indexOf("bio")>-1) icons.push("🌿");
    if(title.indexOf("papier")>-1) icons.push("📦");
    if(title.indexOf("hausmüll")>-1) icons.push("🗑");
    if(title.indexOf("sack")>-1) icons.push("♻");
    if(title.indexOf("reinigung")>-1) icons.push("🧹");
    if(icons.length===0) icons.push("🗑");
    return icons.join(" ");
}

function isSameDay(a,b){ return a.toDateString()===b.toDateString(); }
function formatShort(d){
    var day=("0"+d.getDate()).slice(-2);
    var mon=("0"+(d.getMonth()+1)).slice(-2);
    return day+"."+mon;
}

async function loadStocks() {
  try {
    const proxy = "https://corsproxy.io/?";

    const url = encodeURIComponent(
      "https://query1.finance.yahoo.com/v7/finance/quote?symbols=AAPL"
    );

    const res = await fetch(proxy + url);
    const data = await res.json();

    const stock = data.quoteResponse.result[0];

    const change = stock.regularMarketChangePercent ?? 0;

    document.getElementById("stocks").innerHTML =
      stock.shortName + " " +
      stock.regularMarketPrice +
      " (" + change.toFixed(2) + "%)";

  } catch (e) {
    console.log(e);
    document.getElementById("stocks").innerHTML = "Fehler beim Laden";
  }
}

window.onload = function() {
  loadStocks();
};

loadStocks();
setInterval(loadStocks, 300000);

async function loadNews() {
  const proxy = "https://api.allorigins.win/raw?url=";
  const url = encodeURIComponent("https://feeds.finance.yahoo.com/rss/2.0/headline?s=AAPL&region=US&lang=en-US");

  try {
    const res = await fetch(proxy + url);
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const items = xml.querySelectorAll("item");

    let html = "";

    items.forEach((item, i) => {
      if (i < 5) {
        html += `<p>• ${item.querySelector("title").textContent}</p>`;
      }
    });

    document.getElementById("news").innerHTML = html;
  } catch {
    document.getElementById("news").innerHTML = "News konnten nicht geladen werden";
  }
}
